<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تأمين إدخال الرمز السري للجم</title>
    <link rel="stylesheet" href="css/Normalize.css"/>
    <link rel="stylesheet" href="css/fonts.css"/>
    <link rel="stylesheet" href="css/all.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/media.css"/>

    <style>
    body{
      background-image: url('img/img7.jpg'); 
      background-size: cover;
      direction: rtl; 
    }
    .contuner-div {
      background-color: rgb(0 0 0/ .6);
      height: 100%;
    }
    .pas-div {
      background-color: rgb(0 0 0/ .85);
      width: 85%;
      position: absolute;
      top: 400px;
      left: 50%;
      transform: translate(-50%,-50%);
      height: 200px;
      border-radius: 8px;
      box-shadow: 0px 0px 0px 3px white,0px 0px 10px 1px white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
      align-items: center;
      align-content: center;
    }
    .pas-div input {
      border-radius: 10px;
      width: 40px;
      height: 60px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      color: black;
      padding-right: 5px;
      font-weight: bold;
    }
    .pas-div button {
      padding: 15px;
      font-weight: bold;
      background-color: transparent;
      color: white;
      border: 2px solid white;
      border-radius: 4px;
      font-size: 25px;
      text-shadow: 0px 0px 9px white;
      transition: all .18s;
    }
    .pas-div button:active {
      background-color: rgb(255 255 255 / .6);
      color: black;
    }
    .istrue {
      border: 2px solid rgb(200 0 100);
      width: fit-content;
      color: red;
      background-color: rgb(0 0 0/ .85);
      border-radius: 5px;
      padding: 20px 35px;
      margin: 170px auto;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0px 0px 15px 2.5px red inset,0px 0px 10px 2.5px red;
      text-shadow: 0px 0px 8px red;
    }
    .isttrree {
      border: 2px solid lightgreen;
      width: fit-content;
      color: white;
      background-color: rgb(0 0 0/ .85);
      border-radius: 5px;
      padding: 20px 35px;
      margin: 170px auto;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0px 0px 15px 2.5px lightgreen inset,0px 0px 10px 2.5px lightgreen;
      text-shadow: 0px 0px 8px white;
    }
    </style>
  </head>
  <body>
    <div class="contuner-div">
      <div id="noPas"></div>
      <div class="pas-div">
        <div>
          <input id="1" type="number"/>
          <input id="2" type="number"/>
          <input id="3" type="number"/>
          <input id="4" type="number"/>
          <input id="5" type="number"/>
          <input id="9" type="number"/>
        </div>
        <button type="button" id="submitPasBtn">تأكيد رمز الأمان</button>
      </div>
    </div>

    <!-- ربط الفايربيز لجلب الباسورد مباشرة من السحاب -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBQsedUbO7ux3QEB42j5NEd9JMtS5K-s-Q",
        authDomain: "tiger-gym-system-5a955.firebaseapp.com",
        projectId: "tiger-gym-system-5a955",
        storageBucket: "tiger-gym-system-5a955.firebasestorage.app",
        messagingSenderId: "490575758789",
        appId: "1:490575758789:web:aac8e332f6235aabbb77ac",
        measurementId: "G-T3REQL414D"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // الباسورد الافتراضي لو مفيش نت أو لسة متحفظش داتا
      window.cloudPassword = "159263"; 

      async function fetchCloudPassword() {
        try {
          const docSnap = await getDoc(doc(db, "gym_data", "security_config"));
          if (docSnap.exists() && docSnap.data().pas) {
            window.cloudPassword = docSnap.data().pas;
          }
        } catch (e) {
          console.error("فشل في جلب الباسورد من السحاب، تم تشغيل الافتراضي:", e);
        }
      }
      fetchCloudPassword();
    </script>

    <script src="js/script.js"></script>
    <script>
      let myInputs = document.querySelectorAll("input")
      let myBut = document.getElementById("submitPasBtn")
      let myNoPas = document.querySelector("#noPas")

      myInputs.forEach(function(ele,i,arr){
        ele.addEventListener("input",function(){
          let evl = ele.value.split("")
          if(evl.length === 2){
            ele.value = evl[1]
          }
          arr.forEach(function(el){
            if(el.value === ""){
              ele.blur()
              el.focus()
            }
          })
          if(ele.value === ""){
            ele.blur()
            arr[i + 1].focus()
          }
        })
      })

      myBut.addEventListener("click",function(){
        let inp1 = myInputs[0].value
        let inp2 = myInputs[1].value
        let inp3 = myInputs[2].value
        let inp4 = myInputs[3].value
        let inp5 = myInputs[4].value
        let inp6 = myInputs[5].value
        
        // تعديل الترتيب الصحيح للأرقام من 1 لـ 6
        let pass = `${inp6}${inp5}${inp4}${inp3}${inp2}${inp1}`

        
        myInputs.forEach(function(ele){
          if(ele.value === ""){
            ele.style.border = "3px solid rgb(200 0 70)"
            ele.style.boxShadow = "0px 0px 8px 1px red"
          }else {
            ele.style.border = "none"
            ele.style.boxShadow = "none"
          }
        })

        if(pass.length === 6){
          if(pass !== window.cloudPassword){
            myNoPas.innerHTML = "غلط ⚠️"
            myNoPas.className = "istrue"
          }else {
            myNoPas.innerHTML = "️رمز امان صحيح"
            myNoPas.className = "isttrree"
            setTimeout(function(){
              window.location = "home.html"
            },555)
          }
        }else {
          myNoPas.innerHTML = "لا يقل عن 6 ارقام"
          myNoPas.className = "istrue"
        }
      })
    </script>
  </body>
</html>
