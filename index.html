<!DOCTYPE html>

    <style>
    :root {
      --mainColorBorder: rgb(250 220 10);

    /* إنبوتس تعديل الكارت المباشر */

      width: 50px;

      background-color: rgb(50 50 50);

    /* ستايل شاشة الدخول المدمجة */
    #loginScreen {

    .pas-div input {

      padding: 15px 30px;

  <body>

    <!-- شاشة قفل الدخول المدمجة -->
    <div id="loginScreen">

  <script type="module">

    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQsedUbO7ux3QEB42j5NEd9JMtS5K-s-Q",
      authDomain: "tiger-gym-system-5a955.firebaseapp.com",
      projectId: "tiger-gym-system-5a955",
      storageBucket: "tiger-gym-system-5a955.firebasestorage.app",
      messagingSenderId: "490575758789",
      appId: "1:490575758789:web:aac8e332f6235aabbb77ac",

    };
    

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.cloudPassword = "159263"; 

    window.syncWithFirebase = async function(membersList) {
      localStorage.setItem("gym_members", JSON.stringify(membersList));
      try {
        await setDoc(doc(db, "gym_data", "members_config"), { data: membersList });
      } catch (e) {
        console.error("خطأ في المزامنة السحابية:", e);
      }
    };

    window.syncPasswordWithFirebase = async function(newPas) {
      localStorage.setItem("pas", newPas);
      window.cloudPassword = newPas;
      try {
        await setDoc(doc(db, "gym_data", "security_config"), { pas: newPas });
      } catch (e) {
        console.error("خطأ في رفع الباسورد الجديد:", e);
      }
    };

    async function loadCloudData() {
      try {
        const docSnap = await getDoc(doc(db, "gym_data", "security_config"));
        if (docSnap.exists() && docSnap.data().pas) {
          window.cloudPassword = docSnap.data().pas;
        }
      } catch (e) {
        console.log("نعمد على باسورد محلي أو افتراضي.");
      }

      try {
        const membersSnap = await getDoc(doc(db, "gym_data", "members_config"));
        if (membersSnap.exists() && membersSnap.data().data) {
          localStorage.setItem("gym_members", JSON.stringify(membersSnap.data().data));
          window.gymMembers = membersSnap.data().data;
          window.renderMembers();
        }
      } catch (e) {
        console.log("نعمد على البيانات المحلية حالياً.");
      }
    }
    loadCloudData();
  </script>

  <script>
    // نظام الحماية والأمان بالاعتماد على sessionStorage لضمان طلب الرمز عند غلق التاب
    if (sessionStorage.getItem("isLoggedIn") === "true") {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mainDashboard").style.display = "block";
    }

    // إدارة حركة إنبوتس الرمز السري الـ 6 ارقام
    let myInputs = document.querySelectorAll(".code-inp");
    let myBut = document.getElementById("submitPasBtn");
    let myNoPas = document.querySelector("#noPas");

    myInputs.forEach(function(ele, i, arr){
      ele.addEventListener("input", function(){
        let evl = ele.value.split("");
        if(evl.length >= 2){
          ele.value = evl[evl.length - 1];
        }
        if (ele.value !== "" && i < arr.length - 1) {
          arr[i + 1].focus();
        }
      });
      ele.addEventListener("keydown", function(e) {
        if (e.key === "Backspace" && ele.value === "" && i > 0) {
          arr[i - 1].focus();
        }
      });
    });

    myBut.addEventListener("click", function(){
      let pass = "";
      myInputs.forEach(inp => pass += inp.value);

      myInputs.forEach(function(ele){
        if(ele.value === ""){
          ele.style.border = "3px solid rgb(200 0 70)";
          ele.style.boxShadow = "0px 0px 8px 1px red";
        }else {
          ele.style.border = "none";
          ele.style.boxShadow = "none";
        }
      });

      if(pass.length === 6){
        if(pass !== window.cloudPassword){
          myNoPas.innerHTML = "غلط ⚠️";
          myNoPas.className = "istrue";
        }else {
          myNoPas.innerHTML = "رمز امان صحيح";
          myNoPas.className = "isttrree";
          
          // تصفير الخانات فوراً لزيادة الأمان
          myInputs.forEach(inp => inp.value = "");
          
          setTimeout(function(){
            sessionStorage.setItem("isLoggedIn", "true");
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainDashboard").style.display = "block";
          }, 555);
        }
      }else {
        myNoPas.innerHTML = "لا يقل عن 6 ارقام";
        myNoPas.className = "istrue";
      }
    });

    // سكريبت لوحة البيانات الرئيسية والتحكم
    let op = false;
    let isOpen = document.getElementById("controlBtn");
    let mySpanO = document.querySelector(".oneS");
    let mySpanT = document.querySelector(".twoS");
    
    isOpen.addEventListener("click", function(){
      if(op === false){
        mySpanT.style.transform = "translateX(-15px)";
        op = true;
        mySpanT.style.backgroundColor = "white";
        mySpanO.style.backgroundColor = "rgb(60, 120, 230)";
        mySpanT.style.opacity = "1";
      }else {
        op = false;
        mySpanT.style.transform = "translateX(0px)";
        mySpanT.style.backgroundColor = "gray";
        mySpanO.style.backgroundColor = "rgb(50, 50, 50)";
      }
    });

    let ispas = false;
    let ispee = false;
    let showControlsMode = false; 
    let currentFilter = "all"; 
    
    window.gymMembers = JSON.parse(localStorage.getItem("gym_members")) || [];
    window.editingMembers = {}; // لتتبع الكروت المفتوح فيها زر التعديل المباشر الأزرق

    let myBlock = document.getElementById("ppee");
    let myButPas = document.getElementById("showPas");
    let myDivPas = document.getElementById("pasInp-div");
    let myAddPee = document.getElementById("addPee");
    let myDivPee = document.getElementById("peeInp-div");
    let controlBtn = document.getElementById("controlBtn");
    let smartSearchInp = document.getElementById("smartSearchInp");

    function calculateExpiryDate(startDateString, days) {
      let startDate = new Date(startDateString);
      startDate.setDate(startDate.getDate() + parseInt(days));
      return startDate.toISOString().split('T')[0];
    }

    function getDaysLeft(expiryDateString) {
      let today = new Date();
      today.setHours(0,0,0,0);
      let expiry = new Date(expiryDateString);
      expiry.setHours(0,0,0,0);
      let diffTime = expiry.getTime() - today.getTime();
      return Math.ceil(diffTime / (1000 * 3600 * 24));
    }

    window.renderMembers = function() {
      let container = document.getElementById("membersContainer");
      container.innerHTML = "";
      
      let searchValue = smartSearchInp.value.trim().toLowerCase();

      let filteredList = window.gymMembers.filter(function(member) {
        let daysLeft = getDaysLeft(member.expiryDate);
        let isUnpaid = (parseFloat(member.amountRemaining) || 0) > 0;
        
        if (currentFilter === "expired") return daysLeft <= 0 && !member.isPaused;
        if (currentFilter === "warning") return daysLeft > 0 && daysLeft <= 5 && !member.isPaused;
        if (currentFilter === "unpaid") return isUnpaid;
        if (currentFilter === "paused") return member.isPaused === true;
        return true; 
      });

      if (searchValue !== "") {
        let startsWithSearch = [];
        let containsSearch = [];
        filteredList.forEach(function(member) {
          let mName = member.name.toLowerCase();
          if (mName.startsWith(searchValue)) startsWithSearch.push(member);
          else if (mName.includes(searchValue)) containsSearch.push(member);
        });
        filteredList = startsWithSearch.concat(containsSearch);
      }
      
      if(filteredList.length === 0) {
        let myPAD = document.getElementById("pAd");
        myPAD.innerHTML = filteredList.length;
        container.innerHTML = `<p style="text-align:center; color:black; font-size:18px; margin-top:20px;">مفيش نتايج مطابقة للعرض حالياً</p>`;
        return;
      }

      filteredList.forEach(function(member) {
        let originalIndex = window.gymMembers.findIndex(m => m.id === member.id);
        let daysLeft = getDaysLeft(member.expiryDate);
        let statusColor = "lightgreen";
        let statusText = ` (باقي ${daysLeft} يوم)`;

        if (member.isPaused) {
          statusColor = "#6c757d";
          statusText = `موقوف مؤقتاً ⏸️ (متجمد له ${member.remainingDaysAtPause} يوم)`;
        } else {
          if (daysLeft <= 0) {
            statusColor = "rgb(200 0 70)";
            statusText = "منتهي ❌";
          } else if (daysLeft <= 5) {
            statusColor = "orange";
            statusText = `تنبيه! (${daysLeft} أيام ⚠️)`;
          }
        }

        let card = document.createElement("div");
        card.className = "member-card";
        card.style.borderRight = `8px solid ${statusColor}`;

        let paidVal = member.amountPaid || "0";
        let remainVal = member.amountRemaining || "0";
        let remainColor = parseFloat(remainVal) > 0 ? "rgb(255 70 70)" : "lightgreen";

        // فحص حالة هل زرار التعديل الأزرق شغال للكارت ده ولا لأ
        let isCardEditing = window.editingMembers[member.id] || false;

        if (isCardEditing) {
          // عرض الكارت على هيئة Inputs للتعديل الفوري والدقيق برياحته
          card.innerHTML = `
            <div class="member-main-info">
              <div style="position: absolute; left: 15px; top: 15px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size:12px; color:#3498db;">وضع التعديل</span>
                <span class="card-toggle-span" data-id="${member.id}" style="background-color: rgb(60, 120, 230); justify-content: flex-end;">
                  <span class="card-toggle-circle" style="background-color: white;"></span>
                </span>
              </div>
              <div class="member-row-item" style="margin-top: 20px;">
                <span style="font-size: 15px; color: #aaa;">اسم المشترك:</span>
                <input type="text" class="card-edit-input" id="edit-name-${member.id}" value="${member.name}">
              </div>
              <div class="member-row-item">
                <span style="font-size: 15px; color: #aaa;">تاريخ الاشتراك:</span>
                <input type="date" class="card-edit-input" id="edit-join-${member.id}" value="${member.joinDate}">
              </div>
              <div class="member-row-item">
                <span style="font-size: 15px; color: #aaa;">تاريخ الانتهاء:</span>
                <input type="date" class="card-edit-input" id="edit-expiry-${member.id}" value="${member.expiryDate}">
              </div>
              <div class="member-row-item">
                <span style="font-size: 15px; color: #aaa;">المبلغ الواصل:</span>
                <input type="number" class="card-edit-input" style="width: 28%;" id="edit-paid-${member.id}" value="${paidVal}">
                <span style="font-size: 15px; color: #aaa;">الباقي:</span>
                <input type="number" class="card-edit-input" style="width: 28%;" id="edit-remain-${member.id}" value="${remainVal}">
              </div>
            </div>
          `;
        } else {
          // العرض العادي الثابت للكارت
          let payStatusText = `
            <span style="color:lightgreen; font-weight:bold; margin-left:10px;">واصل (${paidVal})</span> 
            <span style="color:${remainColor}; font-weight:bold;">باقي (${remainVal})</span>
          `;
          
          card.innerHTML = `
            <div class="member-main-info">
              <div style="position: absolute; left: 15px; top: 15px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size:11px; color:#aaa;">تعديل ممتد</span>
                <span class="card-toggle-span" data-id="${member.id}" style="background-color: rgb(50, 50, 50); justify-content: flex-start;">
                  <span class="card-toggle-circle" style="background-color: gray;"></span>
                </span>
              </div>
              <div class="member-row-item" style="margin-top: 15px;">
                <span style="font-size: 16px; color: #aaa;">اسم المشترك:</span>
                <strong style="font-size: 15px; color: #fff;">${member.name}</strong>
              </div>
              <div class="member-row-item">
                <span style="font-size: 15px; color: #aaa;">فترة الاشتراك:</span>
                <span style="font-size: 20px; color: #eee;">من ${member.joinDate} <br>إلى ${member.expiryDate}</span>
              </div>
              <div class="member-row-item">
                <span style="font-size: 15px; color: #aaa;">حالة الدفع :</span>
                <span>${payStatusText}</span>
              </div>
              <div class="member-row-item" style="border-bottom: none; padding-top: 10px;">
                <span style="font-size: 15px; color: #aaa;">حالة الاشتراك الفعلي:</span>
                <strong style="color:${statusColor}; font-size: 15px;">${statusText}</strong>
              </div>
            </div>
          `;
        }

        // تشغيل حدث زر النور الأزرق داخل الكارت
        card.querySelector(".card-toggle-span").addEventListener("click", function() {
          if (!isCardEditing) {
            window.editingMembers[member.id] = true;
            window.renderMembers();
          } else {
            // عند إطفاء الزرار الأزرق يتم حفظ المدخلات فوراً
            let updatedName = document.getElementById(`edit-name-${member.id}`).value.trim();
            let updatedJoin = document.getElementById(`edit-join-${member.id}`).value;
            let updatedExpiry = document.getElementById(`edit-expiry-${member.id}`).value;
            let updatedPaid = document.getElementById(`edit-paid-${member.id}`).value.trim();
            let updatedRemain = document.getElementById(`edit-remain-${member.id}`).value.trim();

            if(updatedName !== "") {
              member.name = updatedName;
            }
            member.joinDate = updatedJoin;
            member.expiryDate = updatedExpiry;
            member.amountPaid = updatedPaid || "0";
            member.amountRemaining = updatedRemain || "0";
            member.isPaid = (parseFloat(member.amountRemaining) || 0) === 0;

            delete window.editingMembers[member.id];
            window.syncWithFirebase(window.gymMembers);
            window.renderMembers();
          }
        });

        // شريط الأزرار الإضافية للتحكم (حذف / تعديل البيانات / تجديد / إيقاف)
        if (showControlsMode) {
          let actionsDiv = document.createElement("div");
          actionsDiv.className = "control-actions-div";

          let deleteBtn = document.createElement("button");
          deleteBtn.className = "btn-control btn-delete";
          deleteBtn.innerText = "حذف الاشتراك";
          deleteBtn.addEventListener("click", function() {
            if(confirm(`هل أنت متأكد من حذف مشترك: ${member.name}؟`)) {
              window.gymMembers.splice(originalIndex, 1);
              window.syncWithFirebase(window.gymMembers);
              window.renderMembers();
            }
          });

          let editBtn = document.createElement("button");
          editBtn.className = "btn-control btn-edit";
          editBtn.innerText = "تعديل البيانات"; // تم تحويل لون الخلفية لـ أخضر غامق بالـ CSS فوق
          editBtn.addEventListener("click", function() {
            let newName = prompt("تعديل الاسم:", member.name);
            let newPaid = prompt("تعديل المبلغ الواصل:", member.amountPaid || "0");
            let newRemain = prompt("تعديل المبلغ الباقي:", member.amountRemaining || "0");
            
            if(newName !== null && newPaid !== null && newRemain !== null) {
              if(newName.trim() !== "") {
                member.name = newName.trim();
              }
              member.amountPaid = newPaid.trim() || "0";
              member.amountRemaining = newRemain.trim() || "0";
              member.isPaid = (parseFloat(member.amountRemaining) || 0) === 0;

              window.syncWithFirebase(window.gymMembers);
              window.renderMembers();
              alert("تم تعديل البيانات والفلوس بنجاح! 💰");
            }
          });

          let renewBtn = document.createElement("button");
          renewBtn.className = "btn-control btn-renew";
          renewBtn.innerText = "تجديد الاشتراك 🔄";
          renewBtn.addEventListener("click", function() {
            if (member.isPaused) {
              alert("يا كابتن فعل الاشتراك الأول قبل ما تجدده!");
              return;
            }
            let extraDays = prompt(`كم عدد الأيام الجديدة لتجديد اشتراك الكابتن (${member.name})؟`, "30");
            if(extraDays && !isNaN(extraDays)) {
              let baseDate = new Date(); 
              let oldExpiry = new Date(member.expiryDate);
              let startDateForRenew = oldExpiry > baseDate ? member.expiryDate : baseDate.toISOString().split('T')[0];
              
              member.expiryDate = calculateExpiryDate(startDateForRenew, extraDays);
              
              let renewPaid = prompt("المبلغ الواصل للتجديد الجديد:", "0");
              let renewRemain = prompt("المبلغ الباقي للتجديد الجديد:", "0");
              
              member.amountPaid = renewPaid || "0";
              member.amountRemaining = renewRemain || "0";
              member.isPaid = (parseFloat(member.amountRemaining) || 0) === 0;
              
              window.syncWithFirebase(window.gymMembers);
              alert(`تم تجديد الاشتراك بنجاح وزيادة ${extraDays} يوم! 🎉`);
              window.renderMembers();
            }
          });

          let pauseToggleBtn = document.createElement("button");
          pauseToggleBtn.className = member.isPaused ? "btn-control btn-resume" : "btn-control btn-pause";
          pauseToggleBtn.innerText = member.isPaused ? "تفعيل الاشتراك ▶️" : "إيقاف مؤقت ⏸️";

          pauseToggleBtn.addEventListener("click", function() {
            if (!member.isPaused) {
              let daysLeft = getDaysLeft(member.expiryDate);
              if (daysLeft <= 0) {
                alert("الاشتراك منتهي بالفعل يا فنان!");
                return;
              }
              member.isPaused = true;
              member.remainingDaysAtPause = daysLeft;
            } else {
              let todayStr = new Date().toISOString().split('T')[0];
              member.expiryDate = calculateExpiryDate(todayStr, member.remainingDaysAtPause);
              member.isPaused = false;
              delete member.remainingDaysAtPause;
            }
            window.syncWithFirebase(window.gymMembers);
            window.renderMembers();
          });

          actionsDiv.append(deleteBtn, editBtn, renewBtn, pauseToggleBtn);
          card.append(actionsDiv);
        }
        container.append(card);
      });
      let myPAD = document.getElementById("pAd");
      myPAD.innerHTML = filteredList.length;
    };

    smartSearchInp.addEventListener("input", window.renderMembers);

    document.querySelectorAll(".filter-tab").forEach(function(tab) {
      tab.addEventListener("click", function() {
        document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active-tab"));
        tab.classList.add("active-tab");
        currentFilter = tab.getAttribute("data-filter");
        window.renderMembers(); 
      });
    });

    myButPas.addEventListener("click", function(){
      if(ispas === false){
        ispas = true;
        let myInpPas = document.createElement("input");
        let myButPasSubmit = document.createElement("button");
        
        myInpPas.className = "inpPas";
        myButPasSubmit.className = "butPas";
        myButPasSubmit.innerHTML = "!تغيير";
        myInpPas.setAttribute("type","number");
        myInpPas.placeholder = "اكتب رمز الامان الجديد";
        
        myDivPas.append(myInpPas, myButPasSubmit);
        
        myInpPas.addEventListener("input", function(){
          if(myInpPas.value.length > 6) myInpPas.value = myInpPas.value.slice(0 , 6);
        });

        myButPasSubmit.addEventListener("click", function(){
          if(myInpPas.value.length === 6){
            window.syncPasswordWithFirebase(myInpPas.value);
            alert("تم تغيير رمز الامان بنجاح ورفعه أونلاين! 🔐");
            myInpPas.value = "";
          }else {
            alert("⚠️اكتب 6 ارقام ‼️");
          }
        });
      }else {
        myDivPas.classList.toggle("block");
      }
    });
    
    myAddPee.addEventListener("click", function(){
      if(ispee === false){
        ispee = true;
        myBlock.classList.remove("block");

        myDivPee.innerHTML = `
          <div class="form-group">
            <label for="inpAddPee"><= اسم المشترك</label>
            <input class="inpAddPee" id="inpAddPee" type="text" placeholder="الاسم ثلاثي">
          </div>
          <div class="form-group">
            <label for="inpAddData"><= تاريخ الاشتراك</label>
            <input class="inpAddData" id="inpAddData" type="date">
          </div>
          <div class="form-group">
            <label for="inpAddfenData"><= مدة الاشتراك</label>
            <input class="inpAddfenData" id="inpAddfenData" type="number" value="30">
          </div>
          
          <div class="money-inputs-group">
            <input type="number" id="amountPaidInp" placeholder="واصل">
            <input type="number" id="amountRemainingInp" placeholder="باقي">
          </div>
          
          <button class="addBut" id="submitMemberBtn" type="button">انشاء اشتراك!</button>
        `;

        document.getElementById("inpAddData").value = new Date().toISOString().split('T')[0];

        document.getElementById("submitMemberBtn").addEventListener("click", function() {
          let nameInp = document.getElementById("inpAddPee");
          let dateInp = document.getElementById("inpAddData");
          let daysInp = document.getElementById("inpAddfenData");
          let paidInp = document.getElementById("amountPaidInp");
          let remainingInp = document.getElementById("amountRemainingInp");

          if(nameInp.value.trim() === "") {
            alert("يا فنان أدخل اسم المشترك أولاً!");
            return;
          }

          let expiry = calculateExpiryDate(dateInp.value, daysInp.value || 30);
          let remainValue = remainingInp.value.trim() || "0";

          let newMember = {
            id: Date.now(),
            name: nameInp.value.trim(),
            joinDate: dateInp.value,
            expiryDate: expiry,
            amountPaid: paidInp.value.trim() || "0",
            amountRemaining: remainValue,
            isPaid: (parseFloat(remainValue) || 0) === 0,
            isPaused: false
          };

          window.gymMembers.push(newMember);
          window.syncWithFirebase(window.gymMembers);
          window.renderMembers();

          nameInp.value = "";
          paidInp.value = "";
          remainingInp.value = "";
          alert("تم إنشاء الاشتراك وحفظ المبالغ بنجاح! 🎉");
        });
      } else {
        myBlock.classList.toggle("block");
      }
    });

    controlBtn.addEventListener("click", function() {
      showControlsMode = !showControlsMode; 
      window.renderMembers(); 
    });
    // دالة التحكم المرن في خطوط الكروت بناءً على حجم الشاشة
function responsiveCardFonts() {
  let screenWidth = window.innerWidth;
  // النسبة المئوية للتصغير بناءً على المقاس المرجعي 384px
  let scaleFactor = screenWidth < 384 ? (screenWidth / 384) : 1;

  // 1. العناوين الجانبية واسم المشترك وحالة الاشتراك
  let smallTexts = document.querySelectorAll(".member-row-item span, .member-main-info strong, .card-edit-input");
  smallTexts.forEach(el => {
    // لو العنصر هو فترة الاشتراك الكبيرة متطبقش عليه المقاس الصغير
    if (el.getAttribute("style") && el.getAttribute("style").includes("font-size: 20px")) return;
    
    let baseSize = 15; // الحجم الأصلي الافتراضي
    el.style.fontSize = (baseSize * scaleFactor) + "px";
  });

  // 2. خط فترات الاشتراك الكبيرة (من ... إلى ...)
  let bigTexts = document.querySelectorAll('.member-row-item span[style*="font-size: 20px"]');
  bigTexts.forEach(el => {
    let baseSize = 20; // الحجم الأصلي الكيبر
    el.style.fontSize = (baseSize * scaleFactor) + "px";
  });
}

// تشغيل الدالة فوراً عند تحميل الصفحة
responsiveCardFonts();

// تشغيل الدالة أوتوماتيك كل ما الشاشة حجمها يتغير (عند تدوير الموبايل مثلاً)
window.addEventListener("resize", responsiveCardFonts);

// تعديل بسيط على الـ renderMembers عشان الدالة تشتغل فوراً أول ما تكارنيهم
let originalRender = window.renderMembers;
window.renderMembers = function() {
  originalRender();
  responsiveCardFonts();
};

  </script>
